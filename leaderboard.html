<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Timeline — טבלת שיאים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0c0c1e;
      --surface: #14142c;
      --border:  #2e2e52;
      --amber:   #e8185c;
      --text:    #f0f0ff;
      --text-dim:#8888aa;
    }
    html, body {
      min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Heebo', sans-serif; display: flex;
      align-items: flex-start; justify-content: center; padding: 32px 16px;
    }
    .card {
      width: 100%; max-width: 480px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px 28px;
      display: flex; flex-direction: column; gap: 8px;
      box-shadow: 0 4px 40px rgba(232,24,92,0.12);
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    h1 { font-size: 24px; font-weight: 700; }
    .back {
      font-size: 14px; color: var(--text-dim); text-decoration: none;
      border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px;
      transition: color 0.15s;
    }
    .back:hover { color: var(--text); }
    .row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 4px; border-bottom: 1px solid var(--border);
    }
    .rank  { font-size: 18px; font-weight: 700; min-width: 28px; }
    .rank.top { color: var(--amber); }
    .rank.dim { color: var(--text-dim); }
    .name  { flex: 1; font-size: 16px; font-weight: 600; }
    .score { font-size: 20px; font-weight: 700; }
    .msg   { color: var(--text-dim); text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>טבלת שיאים</h1>
    <a href="/" class="back">חזרה למשחק</a>
  </div>
  <div id="content"><div class="msg">טוען…</div></div>
</div>

<script>
const SHEET_ID = '1yW9aFO5xhtUaobjj0apTZRn6TmmFt1dvGi-9TVEYrrg';

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  const el = document.getElementById('content');
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
    const res  = await fetch(url);
    const csv  = await res.text();
    const rows = csv.trim().split('\n').slice(1).map(r =>
      r.split(',').map(c => c.replace(/^"|"$/g,'').trim())
    );
    const scores = rows
      .map(r => ({ name: r[0], score: Number(r[1]) }))
      .filter(r => r.name && !isNaN(r.score) && r.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);

    if (!scores.length) { el.innerHTML = '<div class="msg">אין תוצאות עדיין</div>'; return; }

    el.innerHTML = scores.map((r, i) => `
      <div class="row">
        <span class="rank ${i < 3 ? 'top' : 'dim'}">${i + 1}</span>
        <span class="name">${esc(r.name)}</span>
        <span class="score">${r.score}</span>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="msg" style="color:#ff6688;">שגיאה בטעינת הנתונים</div>';
  }
}

load();
</script>
</body>
</html>
